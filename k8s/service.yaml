apiVersion: v1
kind: Service
metadata:
  name: kms
  namespace: lux-system
  labels:
    app: kms
spec:
  type: ClusterIP
  selector:
    app: kms
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: zap
      port: 9652
      targetPort: zap
      protocol: TCP

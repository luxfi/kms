apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms
  namespace: lux-system
  labels:
    app: kms
  # replicas: 1 required for embedded SQLite. For multi-replica, switch to
  # PostgreSQL backend (BASE_DB_URL env var) and set replicas accordingly.
  replicas: 1
  selector:
    matchLabels:
      app: kms
  template:
    metadata:
      labels:
        app: kms
    spec:
      containers:
        - name: kms
          image: ghcr.io/luxfi/kms:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MPC_VAULT_ID
              valueFrom:
                secretKeyRef:
                  name: kms-secrets
                  key: mpc-vault-id
            - name: MPC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kms-secrets
                  key: mpc-token
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data/kms
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kms-data

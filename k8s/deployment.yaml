apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kms
  namespace: lux-system
  labels:
    app: kms
spec:
  serviceName: kms
  replicas: 1
  selector:
    matchLabels:
      app: kms
  template:
    metadata:
      labels:
        app: kms
    spec:
      containers:
        - name: kms
          image: ghcr.io/luxfi/kms:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: BASE_DB_PATH
              value: /data/kms/kms.db
            - name: BASE_DB_ORG_ISOLATION
              value: sqlite
            - name: MPC_VAULT_ID
              valueFrom:
                secretKeyRef:
                  name: kms-secrets
                  key: mpc-vault-id
            - name: MPC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kms-secrets
                  key: mpc-token
            - name: REPLICATE_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: kms-backup
                  key: S3_ENDPOINT
                  optional: true
            - name: REPLICATE_S3_BUCKET
              value: lux-kms-backups
            - name: REPLICATE_AGE_RECIPIENT
              valueFrom:
                secretKeyRef:
                  name: kms-backup
                  key: AGE_RECIPIENT
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data/kms
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

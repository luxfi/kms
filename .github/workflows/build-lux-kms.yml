name: Build Lux KMS
on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'frontend/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/luxfi/kms
    secrets: inherit

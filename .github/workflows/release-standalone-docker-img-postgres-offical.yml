name: Release standalone docker image
on:
    push:
        tags:
            - "kms/v*.*.*-postgres"

jobs:
    kms-tests:
        name: Run tests before deployment
        uses: ./.github/workflows/run-backend-tests.yml

    kms-standalone:
        name: Build kms standalone image postgres
        runs-on: ubuntu-latest
        needs: [kms-tests]
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "version=${GITHUB_REF_NAME#kms/}" >> "$GITHUB_OUTPUT"
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Install dependencies to test all dependencies
              run: npm ci --only-production
              working-directory: backend
            - name: Save commit hashes for tag
              id: commit
              uses: pr-mpt/actions-commit-hash@v3
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: arm64
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set up Depot CLI
              uses: depot/setup-action@v1
            - name: Build backend and push (amd64 + arm64)
              uses: depot/build-push-action@v1
              with:
                  project: 64mmf0n610
                  token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
                  push: true
                  context: .
                  tags: |
                      kms/kms:latest-postgres
                      kms/kms:${{ steps.commit.outputs.short }}
                      kms/kms:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: Dockerfile.standalone-kms
                  build-args: |
                      INSIGHTS_API_KEY=${{ secrets.PUBLIC_INSIGHTS_API_KEY }}
                      KMS_PLATFORM_VERSION=${{ steps.extract_version.outputs.version }}

    kms-fips-standalone:
        name: Build kms FIPS standalone image postgres
        runs-on: ubuntu-latest
        needs: [kms-tests]
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "version=${GITHUB_REF_NAME#kms/}" >> "$GITHUB_OUTPUT"
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Install dependencies to test all dependencies
              run: npm ci --only-production
              working-directory: backend
            - name: Save commit hashes for tag
              id: commit
              uses: pr-mpt/actions-commit-hash@v3
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
              with:
                  platforms: arm64
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set up Depot CLI
              uses: depot/setup-action@v1
            - name: Build FIPS backend and push (amd64 + arm64)
              uses: depot/build-push-action@v1
              with:
                  project: 64mmf0n610
                  token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
                  push: true
                  context: .
                  tags: |
                      kms/kms-fips:latest-postgres
                      kms/kms-fips:${{ steps.commit.outputs.short }}
                      kms/kms-fips:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: Dockerfile.fips.standalone-kms
                  build-args: |
                      INSIGHTS_API_KEY=${{ secrets.PUBLIC_INSIGHTS_API_KEY }}
                      KMS_PLATFORM_VERSION=${{ steps.extract_version.outputs.version }}
